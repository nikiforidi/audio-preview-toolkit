name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] # Triggers publish when a version tag is pushed
  pull_request:
    branches: [ "main" ]

env:
  PYTHON_VERSION: "3.11"

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      # 🔑 CRITICAL: Install ffmpeg so pydub can process audio during tests
      - name: Install system dependencies (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      - name: Run unit tests
        run: pytest tests/ -v

  publish-pypi:
    name: Build & Publish to PyPI
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Only run this job if a tag starting with 'v' is pushed AND the tests passed
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write # Required for trusted publishing (optional but recommended)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Option A: Trusted Publishing (Recommended, no secret needed if configured in PyPI)
          # If you set up Trusted Publishing in PyPI, you can remove the password line below.
          
          # Option B: API Token (Standard)
          password: ${{ secrets.PYPI_API_TOKEN }}